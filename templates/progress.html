<!DOCTYPE html>
<html>

<head>
<title>Progress History</title>
<link rel="stylesheet" href="/static/styles.css">
</head>

<body>

<h1>Client Progress History</h1>

<a href="/dashboard">Back to Dashboard</a>

<table>

<tr>
<th>ID</th>
<th>Client</th>
<th>Week</th>
<th>Adherence</th>
</tr>

{% for p in progress %}

<tr>
<td>{{p[0]}}</td>
<td>{{p[1]}}</td>
<td>{{p[2]}}</td>
<td>{{p[3]}} %</td>
</tr>

{% endfor %}

</table>

</body>
</html>
